<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuikTrip #1247 — TBC Stakeout QC</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #050a14;
    font-family: var(--font-sans);
  }
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    box-sizing: border-box;
  }
  #sss-wrap {
    width: 100%;
    max-width: 720px;
  }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="sss-wrap">

<div id="sss-root" style="background:#0a1220;border-radius:14px;overflow:hidden;font-family:var(--font-sans);color:#e2e8f0;transition:background 0.35s ease;">

<div style="padding:18px 22px 14px;border-bottom:0.5px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
  <div>
    <div id="sss-kicker" style="color:#ffc857;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;opacity:0.85;font-weight:500;">QuikTrip #1247 · stakeout package</div>
    <div id="sss-title" style="color:#fff;font-size:17px;font-weight:500;margin-top:5px;letter-spacing:-0.2px;">Top back of curb — 50 point layout</div>
    <div id="sss-subtitle" style="color:rgba(255,255,255,0.48);font-size:11px;margin-top:3px;">Lot 1.91 ac · NAD83 StatePlane · TBC tolerance 0.02′</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;">
    <div id="sss-stats" style="display:flex;gap:8px;"></div>
    <div id="sss-export" style="display:flex;gap:6px;"></div>
  </div>
</div>

<div style="padding:10px 22px;border-bottom:0.5px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
  <div id="sss-mode" style="display:flex;gap:2px;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px;"></div>
  <div id="sss-toggles" style="display:flex;gap:14px;align-items:center;font-size:11px;color:rgba(255,255,255,0.6);">
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;"><input type="checkbox" id="sss-labels" style="accent-color:#ffc857;cursor:pointer;"> point labels</label>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;"><input type="checkbox" id="sss-errorsonly" style="accent-color:#ef4444;cursor:pointer;"> errors only</label>
  </div>
</div>

<div id="sss-canvas" style="position:relative;padding:8px 8px 4px;">
  <svg id="sss-svg" viewBox="0 0 680 560" style="display:block;width:100%;height:auto;"></svg>
  <div id="sss-tip" style="position:absolute;display:none;pointer-events:none;background:rgba(8,16,28,0.97);border:0.5px solid rgba(255,200,87,0.45);border-radius:8px;padding:10px 13px;color:#fff;font-size:11px;max-width:280px;z-index:10;font-family:var(--font-mono);line-height:1.55;"></div>
</div>

<div id="sss-legend" style="padding:12px 22px 16px;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:11px;color:rgba(255,255,255,0.55);">
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:6px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow:0 0 5px rgba(16,185,129,0.55);"></span>within 0.02′</div>
    <div style="display:flex;align-items:center;gap:6px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ef4444;box-shadow:0 0 7px rgba(239,68,68,0.75);"></span>out of tol ≥0.10′</div>
    <div style="display:flex;align-items:center;gap:6px;"><span style="display:inline-block;width:10px;height:10px;border:1px solid #ffc857;border-radius:50%;"></span>design point</div>
  </div>
  <div style="opacity:0.5;font-size:10px;letter-spacing:0.3px;">offset vectors 120× scale</div>
</div>

</div>

</div>

<script>
(function(){
  const svg = document.getElementById('sss-svg');
  const tip = document.getElementById('sss-tip');
  const canvas = document.getElementById('sss-canvas');
  const root = document.getElementById('sss-root');
  const modeBox = document.getElementById('sss-mode');
  const statsBox = document.getElementById('sss-stats');
  const labelsToggle = document.getElementById('sss-labels');
  const errorsToggle = document.getElementById('sss-errorsonly');
  const legend = document.getElementById('sss-legend');
  const kicker = document.getElementById('sss-kicker');
  const subtitle = document.getElementById('sss-subtitle');
  const toggles = document.getElementById('sss-toggles');

  const SC = 1.8, OX = 52, OY = 514;
  const sx = x => OX + x*SC;
  const sy = y => OY - y*SC;
  const NS = 'http://www.w3.org/2000/svg';
  const el = (t, a) => { const e = document.createElementNS(NS, t); for (const k in (a||{})) e.setAttribute(k, a[k]); return e; };

  // 50 TBC points: [id, easting_ft, northing_ft, feature]
  const PTS_RAW = [
    ['P001',4,4,'Perimeter curb · SW corner'],
    ['P002',80,4,'Perimeter curb · S frontage'],
    ['P003',160,4,'Perimeter curb · S frontage mid'],
    ['P004',240,4,'Perimeter curb · S frontage'],
    ['P005',316,4,'Perimeter curb · SE corner'],
    ['P006',316,70,'Perimeter curb · E before drive'],
    ['P007',316,140,'Perimeter curb · E after drive'],
    ['P008',316,200,'Perimeter curb · E frontage'],
    ['P009',316,256,'Perimeter curb · NE corner'],
    ['P010',220,256,'Perimeter curb · N before drive'],
    ['P011',100,256,'Perimeter curb · N after drive'],
    ['P012',4,256,'Perimeter curb · NW corner'],
    ['P013',155,256,'N drive · E PC'],
    ['P014',170,240,'N drive · E curb return'],
    ['P015',140,233,'N drive · median tip'],
    ['P016',110,240,'N drive · W curb return'],
    ['P017',120,256,'N drive · W PC'],
    ['P018',316,115,'E drive · N PC'],
    ['P019',294,126,'E drive · N curb return'],
    ['P020',285,97,'E drive · median tip'],
    ['P021',294,74,'E drive · S curb return'],
    ['P022',316,80,'E drive · S PC'],
    ['P023',72,75,'Main canopy · island 1 SW'],
    ['P024',80,75,'Main canopy · island 1 SE'],
    ['P025',80,125,'Main canopy · island 1 NE'],
    ['P026',72,125,'Main canopy · island 1 NW'],
    ['P027',112,75,'Main canopy · island 2 SW'],
    ['P028',120,75,'Main canopy · island 2 SE'],
    ['P029',120,125,'Main canopy · island 2 NE'],
    ['P030',112,125,'Main canopy · island 2 NW'],
    ['P031',152,75,'Main canopy · island 3 SW'],
    ['P032',160,75,'Main canopy · island 3 SE'],
    ['P033',160,125,'Main canopy · island 3 NE'],
    ['P034',152,125,'Main canopy · island 3 NW'],
    ['P035',45,155,'Diesel canopy · island SW'],
    ['P036',55,155,'Diesel canopy · island SE'],
    ['P037',55,205,'Diesel canopy · island NE'],
    ['P038',45,205,'Diesel canopy · island NW'],
    ['P039',210,70,'Parking island A · SW'],
    ['P040',220,70,'Parking island A · SE'],
    ['P041',215,85,'Parking island A · N tip'],
    ['P042',255,115,'Parking island B · SW'],
    ['P043',270,115,'Parking island B · SE'],
    ['P044',262,130,'Parking island B · N tip'],
    ['P045',195,145,'Store sidewalk · SW corner'],
    ['P046',295,145,'Store sidewalk · SE corner'],
    ['P047',295,235,'Store sidewalk · NE corner'],
    ['P048',195,235,'Store sidewalk · NW corner'],
    ['P049',280,245,'Trash enclosure · NW corner'],
    ['P050',297,245,'Trash enclosure · NE corner']
  ];
  const REDS = new Set(['P020','P031','P049']);

  function mulberry32(s){return function(){let t=s+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
  const rnd = mulberry32(8821);

  const BASE_N = 10000, BASE_E = 5000;

  const pts = PTS_RAW.map(function(r) {
    const id = r[0], x = r[1], y = r[2], f = r[3];
    const isRed = REDS.has(id);
    const mag = isRed ? (0.105 + rnd()*0.12) : (0.002 + rnd()*0.017);
    const ang = rnd() * Math.PI * 2;
    const dE = Math.cos(ang) * mag;
    const dN = Math.sin(ang) * mag;
    return {
      id: id, f: f,
      dx: x, dy: y,
      ax: x + dE, ay: y + dN,
      dE: dE, dN: dN,
      designN: BASE_N + y,
      designE: BASE_E + x,
      stakedN: BASE_N + y + dN,
      stakedE: BASE_E + x + dE,
      delta: mag,
      status: isRed ? 'red' : 'green'
    };
  });

  // Layer groups
  const gSiteBg = el('g'); svg.appendChild(gSiteBg);
  const gGrid = el('g'); svg.appendChild(gGrid);
  const gLand = el('g', {id:'land'}); svg.appendChild(gLand);
  const gDesign = el('g', {id:'design-features'}); svg.appendChild(gDesign);
  const gDesignLabels = el('g', {id:'design-labels'}); svg.appendChild(gDesignLabels);
  const gPaperWash = el('g', {id:'paper-wash'}); svg.appendChild(gPaperWash);
  const gAsStaked = el('g', {id:'asstaked-features'}); svg.appendChild(gAsStaked);
  const gVectors = el('g', {id:'vectors'}); svg.appendChild(gVectors);
  const gPoints = el('g', {id:'points'}); svg.appendChild(gPoints);
  const gLabels = el('g', {id:'point-labels'}); svg.appendChild(gLabels);
  const gUI = el('g', {id:'ui'}); svg.appendChild(gUI);

  // Site background panel
  gSiteBg.appendChild(el('rect', {x: sx(0), y: sy(260), width: 320*SC, height: 260*SC, fill: '#0d1626', rx: 3}));

  // Grid
  for (let g=0; g<=320; g+=40) {
    gGrid.appendChild(el('line', {x1: sx(g), y1: sy(0), x2: sx(g), y2: sy(260), stroke: '#1e2a42', 'stroke-width': 0.5, opacity: 0.55}));
  }
  for (let g=0; g<=260; g+=40) {
    gGrid.appendChild(el('line', {x1: sx(0), y1: sy(g), x2: sx(320), y2: sy(g), stroke: '#1e2a42', 'stroke-width': 0.5, opacity: 0.55}));
  }

  // Landscape strip
  const landPath = 'M ' + sx(0) + ' ' + sy(0) + ' L ' + sx(320) + ' ' + sy(0) + ' L ' + sx(320) + ' ' + sy(260) + ' L ' + sx(0) + ' ' + sy(260) + ' Z M ' + sx(4) + ' ' + sy(4) + ' L ' + sx(4) + ' ' + sy(256) + ' L ' + sx(316) + ' ' + sy(256) + ' L ' + sx(316) + ' ' + sy(4) + ' Z';
  gLand.appendChild(el('path', {d: landPath, fill: '#142036', 'fill-rule': 'evenodd', opacity: 0.6}));

  // Design features
  gDesign.appendChild(el('rect', {x: sx(0), y: sy(260), width: 320*SC, height: 260*SC, fill: 'none', stroke: '#ffc857', 'stroke-width': 0.7, 'stroke-dasharray': '5 3', opacity: 0.55, rx: 2}));

  // Perimeter curb
  const curbStroke = {stroke: '#38bdf8', 'stroke-width': 1.3, fill: 'none', 'stroke-linecap': 'round'};
  function assign(a, b) { const o = {}; for (const k in a) o[k]=a[k]; for (const k in b) o[k]=b[k]; return o; }
  gDesign.appendChild(el('line', assign({x1: sx(4), y1: sy(4), x2: sx(316), y2: sy(4)}, curbStroke)));
  gDesign.appendChild(el('line', assign({x1: sx(316), y1: sy(4), x2: sx(316), y2: sy(80)}, curbStroke)));
  gDesign.appendChild(el('line', assign({x1: sx(316), y1: sy(115), x2: sx(316), y2: sy(256)}, curbStroke)));
  gDesign.appendChild(el('line', assign({x1: sx(316), y1: sy(256), x2: sx(155), y2: sy(256)}, curbStroke)));
  gDesign.appendChild(el('line', assign({x1: sx(120), y1: sy(256), x2: sx(4), y2: sy(256)}, curbStroke)));
  gDesign.appendChild(el('line', assign({x1: sx(4), y1: sy(256), x2: sx(4), y2: sy(4)}, curbStroke)));

  // Driveway returns
  gDesign.appendChild(el('path', {d:'M ' + sx(155) + ' ' + sy(256) + ' Q ' + sx(170) + ' ' + sy(256) + ' ' + sx(170) + ' ' + sy(240), fill:'none', stroke:'#38bdf8', 'stroke-width':1.2}));
  gDesign.appendChild(el('path', {d:'M ' + sx(120) + ' ' + sy(256) + ' Q ' + sx(110) + ' ' + sy(256) + ' ' + sx(110) + ' ' + sy(240), fill:'none', stroke:'#38bdf8', 'stroke-width':1.2}));
  gDesign.appendChild(el('line', {x1: sx(170), y1: sy(240), x2: sx(170), y2: sy(220), stroke:'#38bdf8', 'stroke-width':1, opacity:0.6, 'stroke-dasharray':'3 2'}));
  gDesign.appendChild(el('line', {x1: sx(110), y1: sy(240), x2: sx(110), y2: sy(220), stroke:'#38bdf8', 'stroke-width':1, opacity:0.6, 'stroke-dasharray':'3 2'}));
  gDesign.appendChild(el('path', {d:'M ' + sx(140) + ' ' + sy(233) + ' L ' + sx(132) + ' ' + sy(252) + ' L ' + sx(148) + ' ' + sy(252) + ' Z', fill:'#142036', stroke:'#38bdf8', 'stroke-width':0.9, opacity:0.85}));
  gDesign.appendChild(el('path', {d:'M ' + sx(316) + ' ' + sy(80) + ' Q ' + sx(316) + ' ' + sy(70) + ' ' + sx(294) + ' ' + sy(74), fill:'none', stroke:'#38bdf8', 'stroke-width':1.2}));
  gDesign.appendChild(el('path', {d:'M ' + sx(316) + ' ' + sy(115) + ' Q ' + sx(316) + ' ' + sy(126) + ' ' + sx(294) + ' ' + sy(126), fill:'none', stroke:'#38bdf8', 'stroke-width':1.2}));
  gDesign.appendChild(el('line', {x1: sx(294), y1: sy(74), x2: sx(270), y2: sy(74), stroke:'#38bdf8', 'stroke-width':1, opacity:0.6, 'stroke-dasharray':'3 2'}));
  gDesign.appendChild(el('line', {x1: sx(294), y1: sy(126), x2: sx(270), y2: sy(126), stroke:'#38bdf8', 'stroke-width':1, opacity:0.6, 'stroke-dasharray':'3 2'}));
  gDesign.appendChild(el('path', {d:'M ' + sx(285) + ' ' + sy(97) + ' L ' + sx(304) + ' ' + sy(90) + ' L ' + sx(304) + ' ' + sy(104) + ' Z', fill:'#142036', stroke:'#38bdf8', 'stroke-width':0.9, opacity:0.85}));

  // Main fuel canopy
  gDesign.appendChild(el('rect', {x: sx(60), y: sy(140), width: 120*SC, height: 75*SC, fill: 'rgba(255,200,87,0.03)', stroke: '#ffc857', 'stroke-width': 0.9, 'stroke-dasharray': '4 2.5', opacity: 0.7, rx: 1}));
  [[72,75,80,125],[112,75,120,125],[152,75,160,125]].forEach(function(r) {
    const x1=r[0], y1=r[1], x2=r[2], y2=r[3];
    gDesign.appendChild(el('rect', {x: sx(x1), y: sy(y2), width: (x2-x1)*SC, height: (y2-y1)*SC, fill: '#1a2d4a', stroke: '#38bdf8', 'stroke-width': 1, rx: 1.5}));
    for (let i=0; i<3; i++) {
      const py2 = y1 + 8 + i*17;
      gDesign.appendChild(el('rect', {x: sx(x1+1), y: sy(py2+4), width: 6*SC, height: 8*SC, fill: 'none', stroke: '#ffc857', 'stroke-width': 0.6, opacity: 0.7, rx: 1}));
    }
  });

  // Diesel canopy
  gDesign.appendChild(el('rect', {x: sx(30), y: sy(215), width: 40*SC, height: 70*SC, fill: 'rgba(255,200,87,0.03)', stroke: '#ffc857', 'stroke-width': 0.9, 'stroke-dasharray': '4 2.5', opacity: 0.7, rx: 1}));
  gDesign.appendChild(el('rect', {x: sx(45), y: sy(205), width: 10*SC, height: 50*SC, fill: '#1a2d4a', stroke: '#38bdf8', 'stroke-width': 1, rx: 1.5}));

  // Main building
  gDesign.appendChild(el('rect', {x: sx(200), y: sy(230), width: 90*SC, height: 80*SC, fill: 'rgba(255,200,87,0.06)', stroke: '#ffc857', 'stroke-width': 1.3, rx: 1}));
  gDesign.appendChild(el('rect', {x: sx(195), y: sy(235), width: 100*SC, height: 90*SC, fill: 'none', stroke: '#38bdf8', 'stroke-width': 0.7, opacity: 0.7, 'stroke-dasharray': '2 1.5', rx: 1}));
  gDesign.appendChild(el('line', {x1: sx(240), y1: sy(150), x2: sx(250), y2: sy(150), stroke: '#ffc857', 'stroke-width': 2.5, opacity: 0.9}));

  // Parking islands
  gDesign.appendChild(el('path', {d:'M ' + sx(210) + ' ' + sy(70) + ' L ' + sx(220) + ' ' + sy(70) + ' L ' + sx(215) + ' ' + sy(85) + ' Z', fill:'#142036', stroke:'#38bdf8', 'stroke-width':0.9}));
  gDesign.appendChild(el('path', {d:'M ' + sx(255) + ' ' + sy(115) + ' L ' + sx(270) + ' ' + sy(115) + ' L ' + sx(262) + ' ' + sy(130) + ' Z', fill:'#142036', stroke:'#38bdf8', 'stroke-width':0.9}));

  // Parking stalls
  for (let i=0; i<7; i++) {
    const sxp = 200 + i*13;
    gDesign.appendChild(el('line', {x1: sx(sxp), y1: sy(130), x2: sx(sxp), y2: sy(145), stroke:'#38bdf8', 'stroke-width':0.5, opacity:0.4}));
  }
  for (let i=0; i<5; i++) {
    const syp = 155 + i*15;
    gDesign.appendChild(el('line', {x1: sx(290), y1: sy(syp), x2: sx(305), y2: sy(syp), stroke:'#38bdf8', 'stroke-width':0.5, opacity:0.4}));
  }

  // Trash enclosure
  gDesign.appendChild(el('rect', {x: sx(278), y: sy(252), width: 22*SC, height: 14*SC, fill: 'rgba(255,200,87,0.05)', stroke: '#ffc857', 'stroke-width': 0.9, rx: 0.5}));
  for (let i=0; i<5; i++) {
    gDesign.appendChild(el('line', {x1: sx(278+i*5), y1: sy(252), x2: sx(283+i*5), y2: sy(238), stroke:'#ffc857', 'stroke-width':0.4, opacity:0.4}));
  }

  // Feature labels
  function mkLabel(x, y, text, size, opacity, color) {
    size = size || 10;
    opacity = opacity == null ? 0.75 : opacity;
    color = color || '#cbd5e1';
    const t = el('text', {x: sx(x), y: sy(y), fill: color, 'font-size': size, 'font-family': 'var(--font-sans)', 'text-anchor': 'middle', opacity: opacity, 'letter-spacing': '0.5', 'font-weight': '500'});
    t.textContent = text;
    gDesignLabels.appendChild(t);
  }
  mkLabel(120, 102, 'MAIN FUEL CANOPY', 9, 0.65);
  mkLabel(50, 180, 'DIESEL', 9, 0.65);
  mkLabel(245, 190, 'STORE', 11, 0.7);
  mkLabel(289, 245, 'TRASH', 7, 0.6);
  mkLabel(138, 245, 'N DRIVE', 8, 0.55);
  mkLabel(285, 97, 'E DRIVE', 7, 0.55, '#cbd5e1');

  // Paper wash
  gPaperWash.appendChild(el('rect', {x: sx(0), y: sy(260), width: 320*SC, height: 260*SC, fill: '#f5efd8', opacity: 0.12, rx: 3}));
  const hatch = el('g', {opacity: 0.04});
  for (let i=-260; i<680; i+=6) {
    hatch.appendChild(el('line', {x1: sx(0)+i, y1: sy(260), x2: sx(0)+i+260*SC, y2: sy(0), stroke: '#f5efd8', 'stroke-width': 0.3}));
  }
  gPaperWash.appendChild(hatch);

  // Offset vectors
  const VEC_SCALE = 120;
  pts.forEach(function(p) {
    const x1 = sx(p.dx), y1 = sy(p.dy);
    const vx = x1 + p.dE * VEC_SCALE;
    const vy = y1 - p.dN * VEC_SCALE;
    const ln = el('line', {
      x1: x1, y1: y1, x2: vx, y2: vy,
      stroke: p.status === 'red' ? '#ef4444' : '#10b981',
      'stroke-width': p.status === 'red' ? 1.1 : 0.7,
      opacity: p.status === 'red' ? 0.85 : 0.55,
      'stroke-linecap': 'round'
    });
    ln.dataset.pid = p.id;
    ln.classList.add('sss-vec');
    gVectors.appendChild(ln);
  });

  // Points
  pts.forEach(function(p) {
    const x = sx(p.dx), y = sy(p.dy);
    const ring = el('circle', {cx: x, cy: y, r: 3, fill: 'none', stroke: '#ffc857', 'stroke-width': 1});
    ring.classList.add('sss-design-pt');
    gPoints.appendChild(ring);

    const ax = x + p.dE * VEC_SCALE;
    const ay = y - p.dN * VEC_SCALE;
    if (p.status === 'red') {
      const halo = el('circle', {cx: ax, cy: ay, r: 8, fill: '#ef4444', opacity: 0.18});
      halo.dataset.pid = p.id;
      halo.classList.add('sss-halo');
      gPoints.appendChild(halo);
    }
    const pt = el('circle', {
      cx: ax, cy: ay,
      r: p.status === 'red' ? 4.5 : 3.2,
      fill: p.status === 'red' ? '#ef4444' : '#10b981',
      stroke: p.status === 'red' ? '#fee2e2' : '#d1fae5',
      'stroke-width': 0.8,
      'data-pid': p.id
    });
    pt.style.cursor = 'pointer';
    pt.classList.add('sss-pt', 'sss-as-pt');
    pt.dataset.status = p.status;
    gPoints.appendChild(pt);

    const label = el('text', {
      x: ax + 6, y: ay - 5,
      'font-size': 8, fill: '#94a3b8',
      'font-family': 'var(--font-mono)', opacity: 0
    });
    label.textContent = p.id;
    label.classList.add('sss-label');
    label.dataset.pid = p.id;
    gLabels.appendChild(label);
  });

  // North arrow
  const arrow = el('g', {transform: 'translate(' + sx(18) + ', ' + sy(235) + ')'});
  arrow.appendChild(el('circle', {cx: 0, cy: 0, r: 14, fill: 'rgba(255,255,255,0.04)', stroke: '#ffc857', 'stroke-width': 0.6, opacity: 0.7}));
  arrow.appendChild(el('path', {d: 'M 0 -10 L 4 6 L 0 3 L -4 6 Z', fill: '#ffc857', opacity: 0.9}));
  const nText = el('text', {x: 0, y: -14, 'font-size': 8, 'text-anchor': 'middle', fill: '#ffc857', 'font-weight': '600'});
  nText.textContent = 'N';
  arrow.appendChild(nText);
  gUI.appendChild(arrow);

  // Scale bar
  const sbY = sy(-12);
  const sbX0 = sx(240);
  const sbLen = 50 * SC;
  gUI.appendChild(el('line', {x1: sbX0, y1: sbY, x2: sbX0 + sbLen, y2: sbY, stroke: '#94a3b8', 'stroke-width': 1}));
  gUI.appendChild(el('line', {x1: sbX0, y1: sbY-3, x2: sbX0, y2: sbY+3, stroke: '#94a3b8', 'stroke-width': 1}));
  gUI.appendChild(el('line', {x1: sbX0+sbLen, y1: sbY-3, x2: sbX0+sbLen, y2: sbY+3, stroke: '#94a3b8', 'stroke-width': 1}));
  gUI.appendChild(el('line', {x1: sbX0+sbLen/2, y1: sbY-2, x2: sbX0+sbLen/2, y2: sbY+2, stroke: '#94a3b8', 'stroke-width': 1}));
  const sbLabel = el('text', {x: sbX0 + sbLen/2, y: sbY+12, 'font-size': 8.5, 'text-anchor': 'middle', fill: '#94a3b8'});
  sbLabel.textContent = '50 ft';
  gUI.appendChild(sbLabel);

  // Watermarks
  const wmDesign = el('text', {x: sx(4), y: sy(-20), 'font-size': 8.5, fill: '#ffc857', opacity: 0.6, 'font-family': 'var(--font-mono)', 'letter-spacing': '1.5'});
  wmDesign.textContent = 'DESIGN · TBC LAYER';
  wmDesign.id = 'wm-design';
  gUI.appendChild(wmDesign);

  const wmStaked = el('text', {x: sx(320), y: sy(-20), 'font-size': 8.5, fill: '#f5efd8', opacity: 0.75, 'font-family': 'var(--font-mono)', 'letter-spacing': '1.5', 'text-anchor': 'end'});
  wmStaked.textContent = 'AS-STAKED · 2026-04-17';
  wmStaked.id = 'wm-staked';
  gUI.appendChild(wmStaked);

  // Stats
  function renderStats() {
    const green = pts.filter(function(p) { return p.status === 'green'; }).length;
    const red = pts.filter(function(p) { return p.status === 'red'; }).length;
    const maxOff = Math.max.apply(null, pts.map(function(p) { return p.delta; }));

    statsBox.innerHTML = '';
    function mkStat(label, val, color) {
      const d = document.createElement('div');
      d.style.cssText = 'padding:6px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);min-width:58px;';
      d.innerHTML = '<div style="font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:0.8px;text-transform:uppercase;">' + label + '</div><div style="font-size:14px;font-weight:500;color:' + color + ';font-family:var(--font-mono);margin-top:2px;">' + val + '</div>';
      return d;
    }
    statsBox.appendChild(mkStat('in tol', green, '#10b981'));
    statsBox.appendChild(mkStat('out', red, '#ef4444'));
    statsBox.appendChild(mkStat('max Δ', maxOff.toFixed(2) + '′', '#ffc857'));
  }
  renderStats();

  // Mode buttons
  const MODES = [
    {id: 'design', label: 'Design'},
    {id: 'overlay', label: 'Overlay'},
    {id: 'asstaked', label: 'As-staked'}
  ];
  let mode = 'overlay';
  const modeBtns = [];
  MODES.forEach(function(m) {
    const b = document.createElement('button');
    b.textContent = m.label;
    b.dataset.mode = m.id;
    b.style.cssText = 'background:transparent;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);cursor:pointer;font-family:inherit;letter-spacing:0.2px;transition:all 0.2s;';
    b.addEventListener('click', function() { setMode(m.id); });
    modeBox.appendChild(b);
    modeBtns.push(b);
  });

  function setMode(m) {
    mode = m;
    modeBtns.forEach(function(b) {
      const active = b.dataset.mode === m;
      b.style.background = active ? '#ffc857' : 'transparent';
      b.style.color = active ? '#1a1a1a' : 'rgba(255,255,255,0.7)';
      b.style.fontWeight = active ? '600' : '500';
    });

    const design = document.getElementById('design-features');
    const designLabs = document.getElementById('design-labels');
    const wash = document.getElementById('paper-wash');
    const vecs = document.getElementById('vectors');
    const designPts = document.querySelectorAll('.sss-design-pt');
    const asPts = document.querySelectorAll('.sss-as-pt');
    const halos = document.querySelectorAll('.sss-halo');
    const labelWm = document.getElementById('wm-design');
    const stakedWm = document.getElementById('wm-staked');

    if (m === 'design') {
      root.style.background = '#0a1220';
      canvas.style.background = '#0a1220';
      design.style.opacity = 1;
      designLabs.style.opacity = 1;
      wash.style.opacity = 0;
      vecs.style.opacity = 0;
      designPts.forEach(function(p) { p.style.opacity = 1; });
      asPts.forEach(function(p) { p.style.opacity = 0; });
      halos.forEach(function(p) { p.style.opacity = 0; });
      labelWm.style.opacity = 0.6;
      stakedWm.style.opacity = 0;
      subtitle.textContent = 'Lot 1.91 ac · NAD83 StatePlane · TBC tolerance 0.02′';
      kicker.textContent = 'QuikTrip #1247 · design file';
      setDarkUI(true);
    } else if (m === 'overlay') {
      root.style.background = '#0a1220';
      canvas.style.background = '#0a1220';
      design.style.opacity = 0.55;
      designLabs.style.opacity = 0.35;
      wash.style.opacity = 1;
      vecs.style.opacity = 1;
      designPts.forEach(function(p) { p.style.opacity = 0.45; });
      asPts.forEach(function(p) { p.style.opacity = 1; });
      halos.forEach(function(p) { p.style.opacity = 1; });
      labelWm.style.opacity = 0.35;
      stakedWm.style.opacity = 0.75;
      subtitle.textContent = 'Field date 2026-04-17 · crew 3 (TS/JP) · Trimble S7 + SX12';
      kicker.textContent = 'QuikTrip #1247 · design + as-staked overlay';
      setDarkUI(true);
    } else {
      root.style.background = '#e8dfc3';
      canvas.style.background = '#e8dfc3';
      design.style.opacity = 0.18;
      designLabs.style.opacity = 0.35;
      wash.style.opacity = 0;
      vecs.style.opacity = 1;
      designPts.forEach(function(p) { p.style.opacity = 0; });
      asPts.forEach(function(p) { p.style.opacity = 1; });
      halos.forEach(function(p) { p.style.opacity = 1; });
      labelWm.style.opacity = 0;
      stakedWm.style.opacity = 1;
      subtitle.textContent = 'As-staked deliverable · submitted to PM · 2026-04-17';
      kicker.textContent = 'QuikTrip #1247 · as-staked submittal';
      setDarkUI(false);
    }
  }

  function setDarkUI(dark) {
    const textMain = dark ? '#fff' : '#1a2332';
    const textMute = dark ? 'rgba(255,255,255,0.55)' : 'rgba(26,35,50,0.65)';
    const textFaint = dark ? 'rgba(255,255,255,0.48)' : 'rgba(26,35,50,0.55)';
    const borderCol = dark ? 'rgba(255,255,255,0.08)' : 'rgba(26,35,50,0.12)';
    const chipBg = dark ? 'rgba(255,255,255,0.06)' : 'rgba(26,35,50,0.06)';

    document.getElementById('sss-title').style.color = textMain;
    subtitle.style.color = textFaint;
    document.querySelectorAll('#sss-root > div').forEach(function(d) {
      d.style.borderColor = borderCol;
    });
    legend.style.color = textMute;
    toggles.style.color = textMute;
    modeBox.style.background = chipBg;
    modeBtns.forEach(function(b) {
      if (b.dataset.mode !== mode) b.style.color = textMute;
    });
    statsBox.querySelectorAll('div').forEach(function(d) {
      if (d.style.fontSize === '9px') d.style.color = textFaint;
    });

    gSiteBg.firstChild.setAttribute('fill', dark ? '#0d1626' : '#f5efd8');
    gLand.firstChild.setAttribute('fill', dark ? '#142036' : '#e8dfc3');
    gLand.firstChild.setAttribute('opacity', dark ? '0.6' : '1');
    gGrid.querySelectorAll('line').forEach(function(l) {
      l.setAttribute('stroke', dark ? '#1e2a42' : '#d4cba6');
    });
    document.getElementById('wm-design').setAttribute('fill', dark ? '#ffc857' : '#8a6d1f');
    document.getElementById('wm-staked').setAttribute('fill', dark ? '#f5efd8' : '#1a2332');
    arrow.querySelector('circle').setAttribute('stroke', dark ? '#ffc857' : '#8a6d1f');
    arrow.querySelector('path').setAttribute('fill', dark ? '#ffc857' : '#8a6d1f');
    nText.setAttribute('fill', dark ? '#ffc857' : '#8a6d1f');
    gUI.querySelectorAll('line').forEach(function(l) { l.setAttribute('stroke', dark ? '#94a3b8' : '#56554a'); });
    sbLabel.setAttribute('fill', dark ? '#94a3b8' : '#56554a');
  }

  // Label toggle
  labelsToggle.addEventListener('change', function() {
    document.querySelectorAll('.sss-label').forEach(function(l) {
      l.style.opacity = labelsToggle.checked ? 0.8 : 0;
    });
  });

  // Errors only toggle
  errorsToggle.addEventListener('change', function() {
    const on = errorsToggle.checked;
    pts.forEach(function(p) {
      const greenFade = on && p.status === 'green' ? 0.1 : 1;
      document.querySelector('circle.sss-as-pt[data-pid="' + p.id + '"]').style.opacity = greenFade;
      const vec = document.querySelector('line.sss-vec[data-pid="' + p.id + '"]');
      if (vec) vec.style.opacity = greenFade * (p.status === 'red' ? 0.85 : 0.55);
    });
  });

  // Tooltip
  function showTip(e, p) {
    const rect = canvas.getBoundingClientRect();
    function fmt(v) { return (v >= 0 ? '+' : '') + v.toFixed(3); }
    const status = p.status === 'red'
      ? '<span style="color:#ef4444;font-weight:600;">OUT OF TOLERANCE</span>'
      : '<span style="color:#10b981;font-weight:600;">IN TOLERANCE</span>';
    const deltaColor = p.status === 'red' ? '#ef4444' : '#10b981';

    tip.innerHTML =
      '<div style="color:#ffc857;font-weight:600;margin-bottom:2px;letter-spacing:0.5px;">' + p.id + '</div>' +
      '<div style="color:rgba(255,255,255,0.65);font-size:10px;margin-bottom:8px;font-family:var(--font-sans);">' + p.f + '</div>' +
      '<div style="color:rgba(255,255,255,0.45);font-size:9.5px;letter-spacing:0.5px;margin-bottom:2px;">DESIGN</div>' +
      '<div>N ' + p.designN.toFixed(2) + '  E ' + p.designE.toFixed(2) + '</div>' +
      '<div style="color:rgba(255,255,255,0.45);font-size:9.5px;letter-spacing:0.5px;margin-top:6px;margin-bottom:2px;">AS-STAKED</div>' +
      '<div>N ' + p.stakedN.toFixed(2) + '  E ' + p.stakedE.toFixed(2) + '</div>' +
      '<div style="margin-top:6px;padding-top:6px;border-top:0.5px solid rgba(255,255,255,0.1);">ΔN ' + fmt(p.dN) + '  ΔE ' + fmt(p.dE) + '</div>' +
      '<div style="margin-top:3px;">Δh <span style="color:' + deltaColor + ';font-weight:600;">' + p.delta.toFixed(3) + '′</span> · ' + status + '</div>';
    tip.style.display = 'block';
    const tx = e.clientX - rect.left + 14;
    const ty = e.clientY - rect.top - 10;
    tip.style.left = Math.min(tx, rect.width - 290) + 'px';
    tip.style.top = Math.max(ty - tip.offsetHeight, 0) + 'px';
  }

  document.querySelectorAll('.sss-as-pt').forEach(function(circle) {
    const p = pts.find(function(pp) { return pp.id === circle.dataset.pid; });
    circle.addEventListener('mouseenter', function(e) { showTip(e, p); });
    circle.addEventListener('mousemove', function(e) { showTip(e, p); });
    circle.addEventListener('mouseleave', function() { tip.style.display = 'none'; });
  });

  // Pulsing halo
  const t0 = performance.now();
  function animate() {
    const t = (performance.now() - t0) / 1000;
    document.querySelectorAll('.sss-halo').forEach(function(h, i) {
      const pulse = 0.5 + Math.sin(t * 2.2 + i) * 0.5;
      h.setAttribute('r', 7 + pulse * 3);
      h.setAttribute('opacity', 0.12 + pulse * 0.14);
    });
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ===== Export buttons =====
  const exportBox = document.getElementById('sss-export');

  const btnStyle = 'background:rgba(255,200,87,0.08);border:0.5px solid rgba(255,200,87,0.35);padding:5px 10px;border-radius:6px;font-size:10.5px;font-weight:500;color:#ffc857;cursor:pointer;font-family:inherit;letter-spacing:0.3px;transition:all 0.15s;display:flex;align-items:center;gap:5px;';

  function makeBtn(label, onClick) {
    const b = document.createElement('button');
    b.innerHTML = label;
    b.style.cssText = btnStyle;
    b.addEventListener('mouseenter', function() { b.style.background = 'rgba(255,200,87,0.18)'; });
    b.addEventListener('mouseleave', function() { b.style.background = 'rgba(255,200,87,0.08)'; });
    b.addEventListener('click', onClick);
    return b;
  }

  const csvBtn = makeBtn('<span style="font-size:11px;">⬇</span> CSV', exportCSV);
  const xlsxBtn = makeBtn('<span style="font-size:11px;">⬇</span> XLSX', exportXLSX);
  exportBox.appendChild(csvBtn);
  exportBox.appendChild(xlsxBtn);

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 100);
  }

  function fmtSigned(v, dec) {
    const s = v.toFixed(dec == null ? 3 : dec);
    return (v >= 0 && s.charAt(0) !== '-') ? '+' + s : s;
  }

  function csvEscape(v) {
    const s = String(v);
    if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  function buildRows() {
    return pts.map(function(p) {
      return [
        p.id,
        p.f,
        p.designN.toFixed(3),
        p.designE.toFixed(3),
        p.stakedN.toFixed(3),
        p.stakedE.toFixed(3),
        fmtSigned(p.dN, 3),
        fmtSigned(p.dE, 3),
        p.delta.toFixed(3),
        '0.020',
        p.status === 'red' ? 'OUT_OF_TOL' : 'IN_TOL'
      ];
    });
  }

  const HEADERS = ['Point_ID','Feature','Design_N','Design_E','Staked_N','Staked_E','Delta_N','Delta_E','Delta_H','Tolerance','Status'];

  function exportCSV() {
    const rows = buildRows();
    const lines = [];
    // Provenance comment rows (prefixed with # — most CSV readers skip or show as text)
    lines.push('# QuikTrip #1247 — TBC Stakeout QC Report');
    lines.push('# Field date: 2026-04-17 · Crew 3 · Trimble S7 + SX12');
    lines.push('# Horizontal tolerance: 0.02 ft · 50 TBC points · 47 in tol / 3 out');
    lines.push('# NOTE: CSV is plain text and cannot carry cell colors. Filter or sort by Status column to isolate OUT_OF_TOL rows.');
    lines.push('');
    lines.push(HEADERS.join(','));
    rows.forEach(function(r) {
      lines.push(r.map(csvEscape).join(','));
    });
    // UTF-8 BOM so Excel opens the file with proper encoding
    const csv = '\uFEFF' + lines.join('\r\n') + '\r\n';
    triggerDownload(new Blob([csv], { type: 'text/csv;charset=utf-8' }), 'quiktrip_1247_tbc_qc.csv');
  }

  function exportXLSX() {
    if (typeof XLSX === 'undefined') {
      alert('XLSX library did not load (offline or CDN blocked). Use the CSV button instead — same data, no cell colors.');
      return;
    }

    const rows = buildRows();
    const aoa = [HEADERS].concat(rows);
    const ws = XLSX.utils.aoa_to_sheet(aoa);

    // Column widths
    ws['!cols'] = [
      {wch: 10}, {wch: 34}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12},
      {wch: 10}, {wch: 10}, {wch: 10}, {wch: 10}, {wch: 13}
    ];
    ws['!freeze'] = { xSplit: 0, ySplit: 1 };

    // Header style
    const headerStyle = {
      fill: { fgColor: { rgb: '1A2332' } },
      font: { color: { rgb: 'FFC857' }, bold: true, sz: 11 },
      alignment: { horizontal: 'left', vertical: 'center' },
      border: {
        bottom: { style: 'medium', color: { rgb: 'FFC857' } }
      }
    };
    for (let c = 0; c < HEADERS.length; c++) {
      const ref = XLSX.utils.encode_cell({ r: 0, c: c });
      if (ws[ref]) ws[ref].s = headerStyle;
    }

    // Row styles
    const redFill = {
      fill: { fgColor: { rgb: 'FEE2E2' } },
      font: { color: { rgb: '991B1B' }, bold: true, sz: 10 },
      border: {
        top: { style: 'thin', color: { rgb: 'EF4444' } },
        bottom: { style: 'thin', color: { rgb: 'EF4444' } },
        left: { style: 'thin', color: { rgb: 'EF4444' } },
        right: { style: 'thin', color: { rgb: 'EF4444' } }
      }
    };
    const greenAccent = {
      font: { color: { rgb: '065F46' }, sz: 10 }
    };
    const normalCell = {
      font: { color: { rgb: '1F2937' }, sz: 10 }
    };

    pts.forEach(function(p, i) {
      const r = i + 1; // data rows start at row 1 (0-indexed)
      for (let c = 0; c < HEADERS.length; c++) {
        const ref = XLSX.utils.encode_cell({ r: r, c: c });
        if (!ws[ref]) continue;
        if (p.status === 'red') {
          ws[ref].s = redFill;
        } else {
          // Highlight just the Status cell green for in-tol rows
          ws[ref].s = (c === HEADERS.length - 1) ? greenAccent : normalCell;
        }
      }
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'TBC Stakeout QC');

    // Metadata
    wb.Props = {
      Title: 'QuikTrip #1247 TBC Stakeout QC',
      Subject: 'Top Back of Curb stakeout verification',
      Author: 'S&F Land Services',
      CreatedDate: new Date()
    };

    XLSX.writeFile(wb, 'quiktrip_1247_tbc_qc.xlsx');
  }

  setMode('overlay');
})();
</script>
</body>
</html>
